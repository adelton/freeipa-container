name: Build and test FreeIPA containers

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * 1,3,5'

jobs:
  build:
    name: Fake build image
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        os: [ fedora-rawhide, fedora-40, fedora-39, centos-9-stream, rocky-9, rocky-8, almalinux-9, almalinux-8 ]
        docker: [ docker ]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Create directory for artifacts
        run: mkdir result-${{ matrix.os }} result-status
      - name: Save result
        run: |
          RESULT=$RANDOM
          echo "Result for ${{ matrix.os }}: $RESULT" | tee result-${{ matrix.os }}/the-result
          if [ $(( $RESULT % 2 )) -eq 0 ] ; then echo "${{ matrix.os }}: $RESULT" | tee result-status/${{ matrix.os }} ; fi
      - uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.os }}
          path: result-${{ matrix.os }}
          retention-days: 1
      - uses: actions/upload-artifact@v4
        with:
          name: result-status-${{ matrix.os }}
          path: result-status
          if-no-files-found: ignore
          retention-days: 1

  consolidate:
    name: Process results from build
    runs-on: ubuntu-latest
    needs: [ build ]
    strategy:
      fail-fast: false
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.produce-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Create directory for artifacts
        run: mkdir result-status
      - uses: actions/download-artifact@v4
        with:
          pattern: result-status-*
          path: result-status
      - run: |
          find result-status -type f | while read f ; do cat $f ; done
      - id: produce-matrix
        run: |
          (
          echo -n 'matrix={"os": ['
          find result-status -type f | sed "s#.*/##; s/^\|\$/\"/g; \$!s/$/,/" | while read f ; do echo -n " $f" ; done
          echo " ]}"
          ) | tee -a $GITHUB_OUTPUT

  push-after-success:
    name: Fake push built images
    runs-on: ubuntu-latest
    needs: [ consolidate ]
    if: |
      needs.consolidate.outputs.matrixx != '{"os": []}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.consolidate.outputs.matrix) }}
    timeout-minutes: 5
    steps:
      - run: echo '${{ needs.consolidate.outputs.matrix }}'
      - run: echo '${{ matrix.os }}'

