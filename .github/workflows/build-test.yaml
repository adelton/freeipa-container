name: Build and test FreeIPA containers

on:
  push:

jobs:
  build:
    name: Build image
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        os: [ fedora-rawhide, fedora-41, fedora-40, centos-9-stream, rocky-9, rocky-8, almalinux-9, almalinux-8 ]
        docker: [ docker ]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Create directory for artifacts
        run: mkdir freeipa-server-${{ matrix.os }}
      - name: Save image
        run: echo ${{ matrix.os }} ${{ matrix.docker }} > freeipa-server-${{ matrix.os }}/freeipa-server-${{ matrix.os }}.out
      - uses: actions/upload-artifact@v4
        with:
          name: freeipa-server-${{ matrix.os }}
          path: freeipa-server-${{ matrix.os }}
          retention-days: 1
      - name: Check resulting labels
        run: |
          mkdir fresh-image
          if ! [ -f "ci/consider-fresh-${{ matrix.os }}" ] ; then
            echo Newly built freeipa-server:${{ matrix.os }} is the same as the existing one.
          else
            echo ${{ matrix.os }} > fresh-image/${{ matrix.os }}
            echo "fresh-image=true" >> $GITHUB_OUTPUT
          fi
        shell: bash
        id: check-fresh-image
      - uses: actions/upload-artifact@v4
        with:
          name: fresh-image-${{ matrix.os }}
          path: fresh-image
          retention-days: 1
        if: steps.check-fresh-image.outputs.fresh-image == 'true'

  master-and-replica:
    name: Run
    runs-on: ${{ matrix.runs-on }}
    needs: [ build, test-plan ]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.test-plan.outputs.matrix-run) }}
    timeout-minutes: 30
    steps:
      - run: true

  test-upgrade:
    name: Upgrade
    runs-on: ${{ matrix.runs-on }}
    needs: [ build ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: fedora-rawhide
            data-from: fedora-41
            runtime: docker
            runs-on: ubuntu-24.04
          - os: fedora-41
            data-from: fedora-41
            runtime: docker
            runs-on: ubuntu-24.04
          - os: fedora-41
            data-from: fedora-40
            runtime: docker
            runs-on: ubuntu-24.04
          - os: fedora-40
            data-from: fedora-39
            runtime: docker
            runs-on: ubuntu-24.04
          - os: rocky-8
            data-from: centos-8-certs-updated-data
            runtime: docker
            runs-on: ubuntu-24.04

          - os: fedora-41
            data-from: fedora-40
            runtime: podman
            runs-on: ubuntu-24.04
          - os: almalinux-8
            data-from: centos-8-certs-updated-data
            runtime: podman
            runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - run: true

  test-k3s:
    name: Run with K3s with docker
    runs-on: ubuntu-24.04
    needs: [ build ]
    strategy:
      fail-fast: false
      matrix:
        os: [ fedora-rawhide, fedora-41, rocky-9, almalinux-8, centos-9-stream ]
    timeout-minutes: 30
    steps:
      - run: true

  push-after-success:
    name: Push images to registries
    runs-on: ubuntu-24.04
    needs: [ master-and-replica, test-upgrade, test-k3s ]
    strategy:
      fail-fast: false
      matrix:
        os: [ fedora-rawhide, fedora-41, fedora-40, centos-9-stream, rocky-9, rocky-8, almalinux-9, almalinux-8 ]
    timeout-minutes: 30
    steps:
      - run: true

  test-plan:
    name: FreeIPA test plan
    runs-on: ubuntu-latest
    needs: [ build ]
    timeout-minutes: 1
    outputs:
      matrix-run: ${{ steps.produce-matrix-run.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: fresh-image-*
          path: fresh-image
          merge-multiple: true
      - name: Amend the .github/build-test-params.yaml with information about built images
        run: |
          (
              echo 'build-os:'
              ( yq '.jobs.build.strategy.matrix.os[]' .github/workflows/build-test.yaml | sed 's/^/  - /' )
              echo 'fresh-os:'
              ls fresh-image | sed 's/^/  - /'
              cat .github/build-test-params.yaml
          ) | yq . - -o json | tee .github/build-test-data.json
      - id: produce-matrix-run
        run: |
          jq -f ci/generate-matrix.jq -c --arg job run --arg count 23 .github/build-test-data.json \
              | ( echo -n 'matrix=' >> $GITHUB_OUTPUT ; tee -a $GITHUB_OUTPUT ) \
              | jq '.[]' -
      - run: jq -f ci/generate-matrix.jq -c --arg job test-upgrade --arg count 7 .github/build-test-data.json | jq '.[]' -
      - run: jq -f ci/generate-matrix.jq -c --arg job k3s --arg count 5 .github/build-test-data.json | jq '.[]' -

      - run: |
          yq '.jobs.master-and-replica.strategy.matrix.include[] | "run/runtime=" + .runtime + "/readonly=" + (.readonly // "") + "/ca=" + (.ca // "") + "/volume=" + (.volume // "") + "/runs-on=" + .runs-on + "/os=" + .os' < .github/workflows/build-test.yaml \
              | while read f ; do mkdir -p "$( dirname "$f" )" ; touch "$f" ; done
          ci/job-summary.sh run 'Test master + replica'
      - run: |
          yq '.jobs.test-upgrade.strategy.matrix.include[] | "upgrade/runtime=" + .runtime + "/runs-on=" + .runs-on + "/data-from=" + .data-from + "/os=" + .os' < .github/workflows/build-test.yaml \
              | while read f ; do mkdir -p "$( dirname "$f" )" ; touch "$f" ; done
          ci/job-summary.sh upgrade 'Test upgrade from older installation'
      - run: |
          yq '.jobs.test-k3s.strategy.matrix.os[] | "k8s/kubernetes=k3s/os=" + .' < .github/workflows/build-test.yaml \
              | while read f ; do mkdir -p "$( dirname "$f" )" ; touch "$f" ; done
          ci/job-summary.sh k8s 'Test in Kubernetes'
      - run: ci/job-summary.sh --legend

  test-subscription:
    # Workaround https://github.com/actions/runner/issues/1138
    name: Prerequisite for RHEL builds
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      has_rhel_subscriptions: ${{ steps.check.outputs.has_rhel_subscriptions }}
    steps:
      - id: check
        run: echo "has_rhel_subscriptions=1" >> $GITHUB_OUTPUT

  build-test-rhel-podman:
    name: Build and test RHEL image
    runs-on: ubuntu-24.04
    needs: [ test-subscription ]
    if: needs.test-subscription.outputs.has_rhel_subscriptions == 1
    strategy:
      fail-fast: false
      matrix:
        os: [ rhel-9, rhel-8 ]
    timeout-minutes: 30
    steps:
      - run: true

